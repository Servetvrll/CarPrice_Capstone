<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automotive AI Valuation - Deep Copper</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* GLOBAL & RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Derin Gece Mavisi - Kömür Grisi gradyan */
            background: linear-gradient(135deg, #10141A 0%, #1A1F26 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #F0EADC;
            min-height: 100vh;
            overflow-x: hidden;
            /* Özel cursor ayarı */
            cursor: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* KÖŞELERDEKİ YUMUŞAK GLOW EFEKTLERİ */
        .glow-circle {
            position: fixed;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(100px);
        }
        .glow-circle.top-left {
            top: -400px; left: -400px;
            background: radial-gradient(circle, rgba(184, 115, 51, 0.08) 0%, transparent 60%);
        }
        .glow-circle.bottom-right {
            bottom: -400px; right: -400px;
            background: radial-gradient(circle, rgba(227, 211, 163, 0.05) 0%, transparent 60%);
        }

        /* LAYOUT & ENTRANCE ANIMATION */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
            
            /* Sayfa açılışında aşağıdan yukarıya fade-in animasyonu */
            animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }
        header h1 {
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -1px;
            color: #D4AF37; /* Antik Altın */
            margin-bottom: 8px;
            text-shadow: 0 4px 20px rgba(212, 175, 55, 0.15);
        }
        header p {
            font-weight: 300;
            color: #A3A8B0;
            letter-spacing: 0.5px;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: minmax(0, 480px) minmax(0, 1fr);
            gap: 30px;
            align-items: stretch;
            justify-content: center;
        }
        @media (max-width: 850px) {
            .layout-grid { 
                grid-template-columns: 1fr; 
                max-width: 550px;
                margin: 0 auto;
            }
        }

        /* SOL KART: DARK SLATE GRAY GLASSMORPHISM */
        .glass-card {
            background: rgba(32, 36, 42, 0.6);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(212, 175, 55, 0.25); /* Altın metalik çerçeve */
            border-radius: 28px;
            padding: 45px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 35px 25px;
        }
        .full-width {
            grid-column: span 2;
        }

        .input-group { position: relative; }
        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #E3D3A3; /* Şampanya Altını */
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        /* Metalik Altın Dokulu Inputs */
        .input-group input, .input-group select {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid rgba(212, 175, 55, 0.4);
            padding: 8px 0;
            font-size: 16px;
            font-family: inherit;
            color: #F0EADC; /* Kırık beyaz / Sıcak beyaz */
            outline: none;
            transition: all 0.3s ease;
        }
        .input-group input::placeholder { color: rgba(240, 234, 220, 0.3); }
        
        /* Select elementlerinin ok işareti stilizasyonu */
        .input-group select option {
            background: #20242A;
            color: #F0EADC;
        }

        /* Focus Altın Parlama Geçiş Efekti */
        .input-group input:focus, .input-group select:focus {
            border-bottom-color: #D4AF37;
            box-shadow: 0 10px 10px -10px rgba(212, 175, 55, 0.6);
        }

        /* Deep Bronze Metalik Execute Button */
        button.execute-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, #B87333 0%, #8A4F1D 100%); /* Yanık Bakır & Bronz */
            border: 1px solid rgba(227, 211, 163, 0.3); /* İnce şampanya altın sınır */
            border-radius: 14px;
            padding: 16px 20px;
            width: 100%;
            margin-top: 10px;
            font-size: 14px;
            font-weight: 800;
            color: #FFFFFA;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(184, 115, 51, 0.25);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        button.execute-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(184, 115, 51, 0.45);
            background: linear-gradient(135deg, #CD7F32 0%, #B87333 100%);
        }
        button.execute-btn:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(184, 115, 51, 0.3);
        }
        
        /* Buton ikonu (dişli) rotasyon efekti */
        button.execute-btn svg {
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        button.execute-btn:hover svg {
            transform: rotate(90deg) scale(1.1);
        }

        /* SAĞ KART: OBSIDIAN BLACK DASHBOARD */
        .black-panel {
            background: #080A0D;
            border-radius: 28px;
            padding: 50px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative;
            
            /* Blueprint tarzı bakır teknik eskiz arka planı (Pure CSS via Gradients) */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(184, 115, 51, 0.04) 0%, transparent 25%),
                radial-gradient(circle at 90% 80%, rgba(184, 115, 51, 0.04) 0%, transparent 25%),
                linear-gradient(rgba(184, 115, 51, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(184, 115, 51, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
        }

        /* Dairesel Gradyan Halkası (Gauge) - Mask Image Tekniği */
        .gauge-wrapper {
            position: relative;
            width: 320px;
            height: 160px; /* Yarım daire */
            overflow: hidden; 
            margin-bottom: 30px;
            /* Yarım dairenin içini boşaltarak kalın bir yay (ring) oluşturuyoruz */
            mask-image: radial-gradient(circle at bottom center, transparent 110px, black 111px);
            -webkit-mask-image: radial-gradient(circle at bottom center, transparent 110px, black 111px);
        }

        .gauge-track {
            position: absolute;
            top: 0; left: 0;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: rgba(227, 211, 163, 0.06); /* Çok soluk altın/bakır iz */
        }

        .gauge-fill {
            position: absolute;
            top: 0; left: 0;
            width: 320px; height: 320px;
            border-radius: 50%;
            /* --gauge-angle ile JS'ten dinamik dolacak. Renkler: Yanık Bakır & Şampanya Altını */
            background: conic-gradient(
                from -90deg at 50% 50%, 
                #B87333 0deg, 
                #E3D3A3 var(--gauge-angle, 0deg), 
                transparent var(--gauge-angle, 0deg), 
                transparent 180deg
            );
        }

        /* Fiyat Tipografisi (Modern, Büyük ve Glow Efektli) */
        .price-display {
            text-align: center;
            z-index: 2; /* Blueprint grid üstünde net dursun */
        }
        
        .price-value {
            font-size: clamp(3rem, 5vw, 4.2rem);
            font-weight: 800;
            margin: 0 0 8px;
            letter-spacing: -2px;
            
            /* Yanık Bakır gradient metin efekti */
            background: linear-gradient(to right, #B87333 20%, #E3D3A3 50%, #CD7F32 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 35px rgba(184, 115, 51, 0.4);
        }
        
        .price-label-primary {
            font-size: 11px;
            color: #E3D3A3;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .price-label-secondary {
            font-size: 10px;
            color: #7A8494;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Yasal İbare */
        .legal-note {
            margin-top: 20px;
            font-size: 9px;
            color: rgba(122, 132, 148, 0.6);
            letter-spacing: 0.5px;
            text-align: center;
            max-width: 80%;
        }

        /* ÖZEL CURSOR (Nokta ve Halka - Copper Theme) */
        #cursor-dot, #cursor-ring {
            position: fixed;
            top: 0; left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        #cursor-dot {
            width: 5px; height: 5px;
            background: #E3D3A3;
            border-radius: 50%;
            box-shadow: 0 0 8px #E3D3A3;
        }
        #cursor-ring {
            width: 32px; height: 32px;
            border: 1px solid rgba(184, 115, 51, 0.8);
            border-radius: 50%;
            transition: width 0.3s ease, height 0.3s ease, background 0.3s ease;
        }
        /* Mobile fallback for cursor */
        @media (pointer: coarse) {
            body { cursor: auto; }
            #cursor-dot, #cursor-ring { display: none; }
        }
    </style>
</head>
<body>

    <!-- Özel Fare İmleci -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- Arkadaki Glow Efektleri -->
    <div class="glow-circle top-left"></div>
    <div class="glow-circle bottom-right"></div>

    <div class="container">
        <header>
            <h1>Automotive AI Valuation</h1>
            <p>Predictive Analytics for Luxury Segment Optimization</p>
        </header>

        <main class="layout-grid">
            
            <!-- FORM SIDE -->
            <div class="glass-card">
                <form id="predict-form" autocomplete="off">
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="brand">Brand</label>
                            <input type="text" id="brand" required placeholder="BMW">
                        </div>
                        <div class="input-group">
                            <label for="model">Model</label>
                            <input type="text" id="model" required placeholder="3 Series">
                        </div>
                        <div class="input-group">
                            <label for="year">Year</label>
                            <input type="number" id="year" required placeholder="2021">
                        </div>
                        <div class="input-group">
                            <label for="transmission">Transmission</label>
                            <select id="transmission" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="Automatic">Automatic</option>
                                <option value="Manual">Manual</option>
                                <option value="Semi-Auto">Semi-Auto</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <!-- Label "MILEAGE", Backend ID remains "km" -->
                            <label for="km">Mileage (KM)</label>
                            <input type="number" id="km" required placeholder="45000">
                        </div>
                        <div class="input-group">
                            <label for="fuelType">Fuel Type</label>
                            <select id="fuelType" required>
                                <option value="" disabled selected>Select...</option>
                                <option value="Petrol">Petrol</option>
                                <option value="Diesel">Diesel</option>
                                <option value="Hybrid">Hybrid</option>
                                <option value="Electric">Electric</option>
                            </select>
                        </div>
                        <div class="input-group full-width">
                            <label for="engineSize">Engine Size (L)</label>
                            <input type="number" step="0.1" id="engineSize" required placeholder="2.0">
                        </div>
                        <div class="input-group full-width">
                            <button type="submit" class="execute-btn" id="execute-btn">
                                <span>Execute Analysis</span>
                                <!-- Zarif Bronz Dişli İkonu -->
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3"></circle>
                                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- RESULT SIDE -->
            <div class="black-panel">
                
                <!-- Dairesel Gradyan Halkası -->
                <div class="gauge-wrapper">
                    <div class="gauge-track"></div>
                    <div class="gauge-fill" id="gauge-fill"></div>
                </div>
                
                <div class="price-display">
                    <div class="price-value" id="predicted-price">0 ₺</div>
                    <div class="price-label-primary">AI-ESTIMATED MARKET VALUE</div>
                    <div class="price-label-secondary">CONFIDENCE SCORE: OPTIMAL</div>
                </div>
                
                <div class="legal-note">
                    * Values derived via Machine Learning model. Market conditions may apply variances.
                </div>
            </div>

        </main>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- ÖZEL CURSOR ---
            const dot = document.getElementById('cursor-dot');
            const ring = document.getElementById('cursor-ring');
            
            let mouseX = window.innerWidth / 2;
            let mouseY = window.innerHeight / 2;
            let ringX = mouseX;
            let ringY = mouseY;

            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                dot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
            });

            function animateRing() {
                const easing = 0.12; 
                ringX += (mouseX - ringX) * easing;
                ringY += (mouseY - ringY) * easing;
                ring.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%, -50%)`;
                requestAnimationFrame(animateRing);
            }
            animateRing();

            const interactiveElements = document.querySelectorAll('input, select, button');
            interactiveElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    ring.style.width = '50px';
                    ring.style.height = '50px';
                    ring.style.background = 'rgba(184, 115, 51, 0.15)';
                    ring.style.borderColor = 'rgba(227, 211, 163, 0.9)';
                });
                el.addEventListener('mouseleave', () => {
                    ring.style.width = '32px';
                    ring.style.height = '32px';
                    ring.style.background = 'transparent';
                    ring.style.borderColor = 'rgba(184, 115, 51, 0.8)';
                });
            });

            // --- TAHMİN & ANİMASYON MANTIĞI ---
            const form = document.getElementById('predict-form');
            const priceEl = document.getElementById('predicted-price');
            const gaugeFill = document.getElementById('gauge-fill');
            const submitBtn = document.getElementById('execute-btn');
            const btnSpan = submitBtn.querySelector('span');

            function formatNumber(val) {
                return new Intl.NumberFormat('tr-TR', { maximumFractionDigits: 0 }).format(val) + " ₺";
            }

            function animatePrediction(startPrice, endPrice, duration = 1800) {
                let startTimestamp = null;
                const maxGaugeValue = 5000000;

                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                    const easeOut = 1 - Math.pow(1 - progress, 4);
                    
                    const currentPrice = startPrice + (endPrice - startPrice) * easeOut;
                    priceEl.textContent = formatNumber(currentPrice);

                    // --- CSS Conic Gradient Halka Animasyonu ---
                    let ratio = Math.min(Math.max(currentPrice / maxGaugeValue, 0), 1);
                    let degrees = ratio * 180;
                    
                    gaugeFill.style.setProperty('--gauge-angle', `${degrees}deg`);

                    if (progress < 1) {
                        requestAnimationFrame(step);
                    }
                };
                requestAnimationFrame(step);
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const originalBtnText = btnSpan.textContent;
                btnSpan.textContent = 'Processing...';
                submitBtn.style.pointerEvents = 'none';
                submitBtn.style.opacity = '0.7';

                const payload = {
                    brand: document.getElementById('brand').value.trim(),
                    model: document.getElementById('model').value.trim(),
                    year: parseInt(document.getElementById('year').value, 10),
                    transmission: document.getElementById('transmission').value,
                    km: parseInt(document.getElementById('km').value, 10),
                    fuelType: document.getElementById('fuelType').value,
                    engineSize: parseFloat(document.getElementById('engineSize').value)
                };

                try {
                    const response = await fetch('/predict', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        throw new Error('Server error predicting value.');
                    }

                    const data = await response.json();
                    
                    const currentText = priceEl.textContent.replace(/\D/g, '');
                    const currentPriceValue = currentText ? parseInt(currentText, 10) : 0;
                    
                    const newPriceValue = data.predicted_price || 0;
                    
                    animatePrediction(currentPriceValue, newPriceValue, 2000);

                } catch (error) {
                    console.error("Fetch Error:", error);
                    alert("A problem occurred connecting to the backend API.");
                } finally {
                    btnSpan.textContent = originalBtnText;
                    submitBtn.style.pointerEvents = 'auto';
                    submitBtn.style.opacity = '1';
                }
            });
        });
    </script>
</body>
</html>
